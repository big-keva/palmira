<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск по libruseq</title>
    <style>
        * 
        {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body 
        {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .search-container 
        {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .search-header 
        {
            margin-bottom: 25px;
            text-align: center;
        }

        .search-header h1 
        {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-form 
        {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input 
        {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        .search-input:focus 
        {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-button 
        {
            padding: 15px 30px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .search-button:hover 
        {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .results-info 
        {
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .results-list 
        {
            list-style: none;
        }

        .result-item 
        {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .result-item:hover 
        {
            transform: translateX(5px);
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .result-link 
        {
            display: block;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .result-link:hover 
        {
            color: #764ba2;
            text-decoration: underline;
        }

        .result-author
        {
            display: block;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .result-path 
        {
            font-size: 12px;
            color: #777;
            font-family: monospace;
            background: #f8f9fa;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-relevance 
        {
            display: inline-block;
            font-size: 12px;
            color: #28a745;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .result-index
        {
            display: inline-block;
            font-size: 12px;
            color: #ccc;
            margin-bottom: 12px;
            margin-left: 2em;
            font-weight: 600;
        }

        .result-quote 
        {
            font-style: italic;
            font-size: 14px;
            color: #555;
            background: #f8f9fa;
            padding: 12px;
            border-left: 3px solid #667eea;
            border-radius: 4px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        /* Стили для выделения найденных слов */
        .highlight 
        {
            background-color: #ffeb3b;
            padding: 1px 4px;
            border-radius: 4px;
            font-weight: bold;
            color: #000;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .ellipsis 
        {
            color: #999;
            font-weight: bold;
            margin: 0 2px;
        }

        /* Стили для пагинации */
        .pagination 
        {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .pagination-info 
        {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .pagination-button 
        {
            padding: 8px 16px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .pagination-button:hover:not(:disabled) 
        {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.4);
        }

        .pagination-button:disabled 
        {
            background: linear-gradient(45deg, #cccccc, #aaaaaa);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .pagination-jump 
        {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .page-input 
        {
            width: 60px;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .page-input:focus 
        {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .action-button 
        {
            padding: 8px 16px;
            background: linear-gradient(45deg, #6c757d, #5a6268);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .loading 
        {
            display: none;
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 18px;
        }

        .loading.active 
        {
            display: block;
        }

        .loading-spinner 
        {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin 
        {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error 
        {
            color: #dc3545;
            padding: 15px;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        .server-info 
        {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #888;
            text-align: center;
        }

        @media (max-width: 768px) 
        {
            .search-form 
            {
                flex-direction: column;
            }
            
            .search-button 
            {
                width: 100%;
            }
            
            .action-button 
            {
                width: 100%;
                text-align: center;
            }
            
            .pagination 
            {
                flex-direction: column;
                gap: 15px;
            }
            
            .pagination-jump 
            {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="search-header">
            <h1>🔍 libruseq</h1>
            <p>Поиск книжек на libruseq</p>
        </div>
        
        <form class="search-form" id="searchForm">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="Введите поисковый запрос для поиска по документам..." 
                autocomplete="off"
                aria-label="Поисковый запрос"
            >
            <button type="submit" class="search-button">🔍 Найти</button>
        </form>

        <div class="error" id="errorMessage" style="display: none;" role="alert"></div>

        <div class="loading" id="loadingIndicator">
            <div class="loading-spinner"></div>
            <p>Ищем документы...</p>
        </div>

        <div class="results-info" id="resultsInfo" style="display: none;">
            🎯 Найдено документов: <strong><span id="foundCount">0</span></strong> 
            ⏱️ Время поиска: <strong><span id="elapsedTime">0</span> мс</strong>
            📄 Показано: <strong><span id="shownCount">0</span></strong>
            📍 Страница: <strong><span id="currentPage">1</span></strong> из <strong><span id="totalPages">1</span></strong>
        </div>

        <ul class="results-list" id="resultsList"></ul>
        
        <div class="pagination" id="pagination" style="display: none;">
            <button class="pagination-button" id="firstPageBtn" title="Первая страница">««</button>
            <button class="pagination-button" id="prevPageBtn" title="Предыдущая страница">‹ Назад</button>
            
            <div class="pagination-info">
                Страница <span id="pageNumber">1</span> из <span id="totalPagesPagination">1</span>
            </div>
            
            <button class="pagination-button" id="nextPageBtn" title="Следующая страница">Вперед ›</button>
            
            <div class="pagination-jump">
                <span>Перейти:</span>
                <input type="number" class="page-input" id="pageJumpInput" min="1" value="1">
                <button class="pagination-button" id="jumpPageBtn">OK</button>
            </div>
        </div>
        
        <div class="server-info" id="serverInfo">
            Подключение к серверу: <span id="serverStatus">Не подключено</span>
        </div>
    </div>

    <script>
        // Конфигурация сервера
        const SERVER_CONFIG = 
        {
            baseUrl: 'http://localhost:57571',
            
            endpoints: 
            {
                search: '/search',
                path: '/path'
            },
            
            // Настройки запросов
            requestTimeout: 20000,
            retryAttempts: 2,
            
            // Настройки пагинации
            pagination: 
            {
                itemsPerPage: 10,
                maxVisiblePages: 5
            }
        };

        class RemoteFileSearch 
        {
            constructor() 
            {
                this.searchInput = document.getElementById('searchInput');
                this.searchForm = document.getElementById('searchForm');
                this.resultsList = document.getElementById('resultsList');
                this.resultsInfo = document.getElementById('resultsInfo');
                this.foundCount = document.getElementById('foundCount');
                this.elapsedTime = document.getElementById('elapsedTime');
                this.shownCount = document.getElementById('shownCount');
                this.currentPage = document.getElementById('currentPage');
                this.totalPages = document.getElementById('totalPages');
                
                this.errorMessage = document.getElementById('errorMessage');
                this.loadingIndicator = document.getElementById('loadingIndicator');
                this.serverStatus = document.getElementById('serverStatus');
                
                // Элементы пагинации
                this.pagination = document.getElementById('pagination');
                this.firstPageBtn = document.getElementById('firstPageBtn');
                this.prevPageBtn = document.getElementById('prevPageBtn');
                this.nextPageBtn = document.getElementById('nextPageBtn');
                this.pageNumber = document.getElementById('pageNumber');
                this.totalPagesPagination = document.getElementById('totalPagesPagination');
                this.pageJumpInput = document.getElementById('pageJumpInput');
                this.jumpPageBtn = document.getElementById('jumpPageBtn');
                
                // Таймеры для правильного debounce
                this.debounceTimer = null;
                this.lastTypingTime = 0;
                this.isTyping = false;
                this.DEBOUNCE_DELAY = 250;
                
                // Состояние для отслеживания изменений
                this.lastSearchValue = '';
                
                // Контроллеры для отмены запросов
                this.currentRequestController = null;
                this.requestSequence = 0;
                
                this.isConnected = false;
                
                // Состояние пагинации
                this.currentQuery = '';
                this.currentFirstItem = 1;
                this.totalFound = 0;
                this.itemsPerPage = SERVER_CONFIG.pagination.itemsPerPage;
                
                this.initializeEvents();
                this.checkServerConnection();
            }
            
            initializeEvents() 
            {
                this.searchForm.addEventListener('submit', (e) => 
                {
                    e.preventDefault();
                    this.performSearch(1);
                });
                
                // Отслеживаем только событие input для изменений
                this.searchInput.addEventListener('input', () => 
                {
                    this.handleInputChange();
                });
                
                // Обработчики пагинации
                this.firstPageBtn.addEventListener('click', () => 
                {
                    this.goToPage(1);
                });
                
                this.prevPageBtn.addEventListener('click', () => 
                {
                    this.goToPage(this.getCurrentPage() - 1);
                });
                
                this.nextPageBtn.addEventListener('click', () => 
                {
                    this.goToPage(this.getCurrentPage() + 1);
                });
                
                this.jumpPageBtn.addEventListener('click', () => 
                {
                    const page = parseInt(this.pageJumpInput.value);
                    if (page >= 1 && page <= this.getTotalPages()) 
                    {
                        this.goToPage(page);
                    }
                    else 
                    {
                        this.showError(`Введите номер страницы от 1 до ${this.getTotalPages()}`);
                    }
                });
                
                this.pageJumpInput.addEventListener('keypress', (e) => 
                {
                    if (e.key === 'Enter') 
                    {
                        this.jumpPageBtn.click();
                    }
                });
            }
            
            // Обработка изменений в поле ввода
            handleInputChange() 
            {
                const currentValue = this.searchInput.value.trim();
                
                // Проверяем, действительно ли изменилось значение
                if (currentValue !== this.lastSearchValue) 
                {
                    // Обновляем последнее значение
                    this.lastSearchValue = currentValue;
                    
                    // Отменяем текущий запрос, так как значение изменилось
                    this.cancelCurrentRequest();
                    
                    // Обновляем время последнего ввода
                    this.lastTypingTime = Date.now();
                    this.isTyping = true;
                    
                    // Сбрасываем предыдущий таймер
                    if (this.debounceTimer) 
                    {
                        clearTimeout(this.debounceTimer);
                        this.debounceTimer = null;
                    }
                    
                    // Устанавливаем новый таймер для debounce
                    this.debounceTimer = setTimeout(() => 
                    {
                        this.checkTypingFinished();
                    }, this.DEBOUNCE_DELAY);
                }
            }
            
            // Проверка, закончил ли пользователь ввод
            checkTypingFinished() 
            {
                const now = Date.now();
                const timeSinceLastTyping = now - this.lastTypingTime;
                
                if (timeSinceLastTyping >= this.DEBOUNCE_DELAY) 
                {
                    this.isTyping = false;
                    this.debounceSearch();
                }
                else 
                {
                    // Если прошло недостаточно времени, ждем еще
                    this.debounceTimer = setTimeout(() => 
                    {
                        this.checkTypingFinished();
                    }, this.DEBOUNCE_DELAY - timeSinceLastTyping);
                }
            }
            
            // Основная функция debounce - запускает поиск
            debounceSearch() 
            {
                // Очищаем предыдущий таймер
                if (this.debounceTimer) 
                {
                    clearTimeout(this.debounceTimer);
                }
                
                // Запускаем поиск, если пользователь закончил ввод
                const currentValue = this.searchInput.value.trim();
                if (currentValue) 
                {
                    this.performSearch(1);
                }
                else 
                {
                    this.clearResults();
                }
            }
            
            // Отмена текущего запроса
            cancelCurrentRequest() 
            {
                if (this.currentRequestController) 
                {
                    this.currentRequestController.abort();
                    this.currentRequestController = null;
                    console.log('Предыдущий запрос отменен');
                }
            }
            
            // Проверка подключения к серверу
            async checkServerConnection() 
            {
                try 
                {
                    this.serverStatus.textContent = 'Проверка...';
                    this.serverStatus.style.color = '#ffc107';
                    
                    // Создаем отдельный контроллер для проверки подключения
                    const healthController = new AbortController();
                    const healthTimeoutId = setTimeout(() => healthController.abort(), 3000);
                    
                    const response = await fetch(`${SERVER_CONFIG.baseUrl}/health`, 
                    {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' },
                        signal: healthController.signal
                    }).catch(() => null);
                    
                    clearTimeout(healthTimeoutId);
                    
                    if (response && response.ok) 
                    {
                        this.isConnected = true;
                        this.serverStatus.textContent = '✓ Подключено';
                        this.serverStatus.style.color = '#28a745';
                    }
                    else 
                    {
                        this.serverStatus.textContent = '✗ Недоступен';
                        this.serverStatus.style.color = '#dc3545';
                        this.showError('Сервер недоступен. Проверьте подключение к сети.');
                    }
                } 
                catch (error) 
                {
                    this.serverStatus.textContent = '✗ Ошибка подключения';
                    this.serverStatus.style.color = '#dc3545';
                    console.warn('Сервер недоступен:', error.message);
                }
            }
            
            async performSearch(firstItem = 1) 
            {
                const query = this.searchInput.value.trim();
                
                if (!query) 
                {
                    this.clearResults();
                    return;
                }
                
                if (!this.isConnected) 
                {
                    this.showError('Сервер недоступен. Проверьте подключение.');
                    return;
                }
                
                this.currentQuery = query;
                this.currentFirstItem = firstItem;
                this.requestSequence++;
                
                const currentSequence = this.requestSequence;
                
                // Отменяем предыдущий запрос только если это новый запрос
                // (не при переходе по пагинации того же запроса)
                if (firstItem === 1) 
                {
                    this.cancelCurrentRequest();
                }
                
                // Создаем новый контроллер для текущего запроса
                this.currentRequestController = new AbortController();
                
                this.showLoading();
                this.hideError();
                
                try 
                {
                    const response = await this.sendSearchRequest(
                        query, 
                        firstItem, 
                        this.itemsPerPage,
                        this.currentRequestController.signal,
                        currentSequence
                    );
                    
                    // Проверяем, не был ли запрос заменен более новым
                    if (currentSequence === this.requestSequence) 
                    {
                        this.displayResults(response);
                    }
                    else 
                    {
                        console.log('Результаты запроса проигнорированы, так как есть более новый запрос');
                    }
                } 
                catch (error) 
                {
                    // Игнорируем ошибки отмены запроса
                    if (error.name !== 'AbortError') 
                    {
                        // Проверяем, не был ли запрос заменен более новым
                        if (currentSequence === this.requestSequence) 
                        {
                            this.showError(`Ошибка поиска: ${error.message}`);
                        }
                    }
                }
                finally 
                {
                    // Скрываем индикатор загрузки только если это последний запрос
                    if (currentSequence === this.requestSequence) 
                    {
                        this.hideLoading();
                    }
                }
            }
            
            async sendSearchRequest(query, first, count, signal, sequence) 
            {
                const requestBody = JSON.stringify({ 
                    string: query,
                    first: first,
                    count: count
                });
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), SERVER_CONFIG.requestTimeout);
                
                // Объединяем сигналы: от таймаута и от пользовательской отмены
                const abortHandler = () => 
                {
                    controller.abort();
                };
                signal.addEventListener('abort', abortHandler);
                
                try 
                {
                    console.log(`Отправка запроса #${sequence}: "${query.substring(0, 50)}${query.length > 50 ? '...' : ''}"`);
                    
                    const response = await fetch(`${SERVER_CONFIG.baseUrl}${SERVER_CONFIG.endpoints.search}`, 
                    {
                        method: 'POST',
                        headers: 
                        {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: requestBody,
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    signal.removeEventListener('abort', abortHandler);
                    
                    if (!response.ok) 
                    {
                        throw new Error(`Ошибка сервера: ${response.status} ${response.statusText}`);
                    }
                    
                    console.log(`Получен ответ для запроса #${sequence}`);
                    return await response.json();
                } 
                catch (error) 
                {
                    clearTimeout(timeoutId);
                    signal.removeEventListener('abort', abortHandler);
                    
                    if (error.name === 'AbortError') 
                    {
                        if (signal.aborted) 
                        {
                            throw new Error('Запрос отменен');
                        }
                        else 
                        {
                            throw new Error('Таймаут запроса. Сервер не ответил вовремя.');
                        }
                    }
                    
                    if (error.name === 'TypeError' && error.message.includes('Failed to fetch')) 
                    {
                        throw new Error('Не удалось подключиться к серверу. Проверьте сеть.');
                    }
                    
                    throw error;
                }
            }
            
            displayResults(data) 
            {
                this.clearResults();

                if (data.timer && data.timer.elapsed) 
                {
                    this.elapsedTime.textContent = data.timer.elapsed;
                }

                if (data.found === 0) 
                {
                    this.foundCount.textContent = '0';
                    this.shownCount.textContent = '0';
                    this.resultsInfo.style.display = 'block';
                    this.pagination.style.display = 'none';
                    this.showError('По вашему запросу ничего не найдено.');
                    return;
                }
                
                this.totalFound = data.found;
                this.foundCount.textContent = this.totalFound;
                
                // Обновляем информацию о текущей странице
                const currentPage = this.getCurrentPage();
                const totalPages = this.getTotalPages();
                const shownItems = data.items ? data.items.length : 0;
                
                this.currentPage.textContent = currentPage;
                this.totalPages.textContent = totalPages;
                this.shownCount.textContent = shownItems;
                this.pageNumber.textContent = currentPage;
                this.totalPagesPagination.textContent = totalPages;
                this.pageJumpInput.value = currentPage;
                this.pageJumpInput.max = totalPages;
                
                // Обновляем элементы пагинации
                this.updatePaginationControls();
                
                if (data.items && data.items.length > 0) 
                {
                    data.items.forEach(item => 
                    {
                        const listItem = this.createResultItem(item);
                        this.resultsList.appendChild(listItem);
                    });
                }

                this.resultsInfo.style.display = 'block';
                this.pagination.style.display = 'flex';
            }
            
            // Обновление состояния кнопок пагинации
            updatePaginationControls() 
            {
                const currentPage = this.getCurrentPage();
                const totalPages = this.getTotalPages();
                
                // Первая страница и предыдущая
                this.firstPageBtn.disabled = currentPage <= 1;
                this.prevPageBtn.disabled = currentPage <= 1;
                
                // Следующая страница
                this.nextPageBtn.disabled = currentPage >= totalPages;
                
                // Обновляем подсказки
                this.firstPageBtn.title = currentPage <= 1 ? 'Вы на первой странице' : 'Первая страница';
                this.prevPageBtn.title = currentPage <= 1 ? 'Вы на первой странице' : 'Предыдущая страница';
                this.nextPageBtn.title = currentPage >= totalPages ? 'Вы на последней странице' : 'Следующая страница';
            }
            
            // Переход на указанную страницу
            goToPage(page) 
            {
                if (page < 1) page = 1;
                if (page > this.getTotalPages()) page = this.getTotalPages();
                
                const first = (page - 1) * this.itemsPerPage + 1;
                
                // Не отменяем запрос при переходе по пагинации того же запроса
                this.performSearch(first);
            }
            
            // Получение текущей страницы (1-based)
            getCurrentPage() 
            {
                return Math.ceil(this.currentFirstItem / this.itemsPerPage);
            }
            
            // Получение общего количества страниц
            getTotalPages() 
            {
                return Math.ceil(this.totalFound / this.itemsPerPage);
            }
            
            createResultItem(item) 
            {
                const li = document.createElement('li');
                li.className = 'result-item';
                
                // Название файла с иконкой
                const title = document.createElement('div');
                title.className = 'result-link';
                title.textContent = `📄 ${item.extra.title}`;
                title.onclick = () => this.downloadFile(item.id);
                
                // Автор
                const author = document.createElement('div');
                author.className = 'result-author';
                author.textContent = item.extra.author;
                
                // Полный путь к файлу
                const path = document.createElement('div');
                path.className = 'result-path';
                path.textContent = item.id;
                path.title = item.id;
                
                // Релевантность
                const relevance = document.createElement('div');
                relevance.className = 'result-relevance';
                relevance.textContent = `Релевантность: ${item.range.toFixed(2)}`;
                
                // Индекс в общем списке результатов
                const aindex = document.createElement('div');
                aindex.className = 'result-index';
                if (item.originalIndex) 
                {
                    aindex.textContent = `Позиция в результатах: ${item.originalIndex}`;
                }
                else 
                {
                    aindex.textContent = `Индекс: ${item.index}`;
                }
                
                // Цитата с обработкой сложной структуры
                const quote = document.createElement('div');
                quote.className = 'result-quote';
                
                if (item.quote) 
                {
                    const quoteContent = this.processComplexQuote(item.quote);
                    quote.appendChild(quoteContent);
                } 
                else 
                {
                    quote.textContent = 'Цитата не доступна';
                }
                
                li.appendChild(title);
                li.appendChild(author);
                li.appendChild(path);
                li.appendChild(relevance);
                li.appendChild(aindex);
                li.appendChild(quote);
                
                return li;
            }
            
            // Обработка сложной структуры цитаты
            processComplexQuote(quoteData)
            {
                const container = document.createElement('span');
                
                if (Array.isArray(quoteData))
                {
                    let previousItemWasString = false;
                    
                    quoteData.forEach((item, index) =>
                    {
                        const processedItem = this.processQuoteItem(item);
                        
                        // Добавляем разделитель между элементами
                        if (index > 0)
                        {
                            const currentIsString = typeof item === 'string' || 
                                                   (typeof item === 'object' && item !== null && 
                                                    typeof Object.values(item)[0] === 'string');
                            
                            if (previousItemWasString && currentIsString)
                            {
                                const ellipsisSpan = document.createElement('span');
                                ellipsisSpan.className = 'ellipsis';
                                ellipsisSpan.textContent = '…';
                                container.appendChild(ellipsisSpan);
                            }
                            else
                            {
                                const lineBreak = document.createElement('br');
                                container.appendChild(lineBreak);
                            }
                        }
                        
                        container.appendChild(processedItem);
                        previousItemWasString = typeof item === 'string';
                    });
                }
                else if (typeof quoteData === 'string')
                {
                    const processedText = this.processHighlightedText(quoteData);
                    container.appendChild(processedText);
                }
                else if (typeof quoteData === 'object' && quoteData !== null)
                {
                    const processedItem = this.processQuoteItem(quoteData);
                    container.appendChild(processedItem);
                }
                
                return container;
            }
            
            // Обработка одного элемента цитаты
            processQuoteItem(item)
            {
                const container = document.createElement('span');
                
                if (typeof item === 'string')
                {
                    const processedText = this.processHighlightedText(item);
                    container.appendChild(processedText);
                }
                else if (typeof item === 'object' && item !== null)
                {
                    Object.entries(item).forEach(([key, value]) =>
                    {
                        if (Array.isArray(value))
                        {
                            const arrayContainer = this.processComplexQuote(value);
                            container.appendChild(arrayContainer);
                        }
                        else if (typeof value === 'string')
                        {
                            const processedText = this.processHighlightedText(value);
                            container.appendChild(processedText);
                        }
                        else if (typeof value === 'object' && value !== null)
                        {
                            const nestedItem = this.processQuoteItem(value);
                            container.appendChild(nestedItem);
                        }
                    });
                }
                
                return container;
            }
            
            // Обработка текста с символами выделения \x07 и \x08
            processHighlightedText(text) 
            {
                const container = document.createElement('span');
                
                if (typeof text !== 'string') 
                {
                    container.textContent = String(text);
                    return container;
                }
                
                const startMark = '\x07';
                const endMark = '\x08';
                const ellipsisChar = '\u2026';
                
                let inHighlight = false;
                let buffer = '';
                
                let startIndex = 0;
                if (text.startsWith(ellipsisChar))
                {
                    const ellipsisSpan = document.createElement('span');
                    ellipsisSpan.className = 'ellipsis';
                    ellipsisSpan.textContent = ellipsisChar;
                    container.appendChild(ellipsisSpan);
                    startIndex = ellipsisChar.length;
                }
                
                for (let i = startIndex; i < text.length; i++) 
                {
                    const char = text[i];
                    
                    if (i <= text.length - ellipsisChar.length && 
                        text.substring(i, i + ellipsisChar.length) === ellipsisChar)
                    {
                        if (buffer) 
                        {
                            const span = document.createElement('span');
                            if (inHighlight) 
                            {
                                span.className = 'highlight';
                            }
                            span.textContent = buffer;
                            container.appendChild(span);
                            buffer = '';
                        }
                        
                        const ellipsisSpan = document.createElement('span');
                        ellipsisSpan.className = 'ellipsis';
                        ellipsisSpan.textContent = ellipsisChar;
                        container.appendChild(ellipsisSpan);
                        
                        i += ellipsisChar.length - 1;
                        continue;
                    }
                    
                    if (char === startMark && !inHighlight) 
                    {
                        if (buffer) 
                        {
                            const normalSpan = document.createElement('span');
                            normalSpan.textContent = buffer;
                            container.appendChild(normalSpan);
                            buffer = '';
                        }
                        inHighlight = true;
                    } 
                    else if (char === endMark && inHighlight) 
                    {
                        if (buffer) 
                        {
                            const highlightSpan = document.createElement('span');
                            highlightSpan.className = 'highlight';
                            highlightSpan.textContent = buffer;
                            container.appendChild(highlightSpan);
                            buffer = '';
                        }
                        inHighlight = false;
                    } 
                    else 
                    {
                        buffer += char;
                    }
                }
                
                if (buffer) 
                {
                    const finalSpan = document.createElement('span');
                    if (inHighlight) 
                    {
                        finalSpan.className = 'highlight';
                    }
                    finalSpan.textContent = buffer;
                    container.appendChild(finalSpan);
                }
                
                return container;
            }
            
            // Скачивание файла с удалённого сервера
            downloadFile(filePath) 
            {
                try 
                {
                    const encodedPath = encodeURIComponent(filePath);
                    const downloadUrl = `${SERVER_CONFIG.baseUrl}${SERVER_CONFIG.endpoints.download}?path=${encodedPath}`;
                    
                    window.open(downloadUrl, '_blank');
                } 
                catch (error) 
                {
                    this.showError(`Не удалось скачать файл: ${error.message}`);
                }
            }
            
            // Копирование пути в буфер обмена
            async copyToClipboard(text) 
            {
                try 
                {
                    await navigator.clipboard.writeText(text);
                    this.showError('Путь скопирован в буфер обмена!', 'success');
                } 
                catch (error) 
                {
                    const textArea = document.createElement('textarea');
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    this.showError('Путь скопирован в буфер обмена!', 'success');
                }
            }
            
            showLoading() 
            {
                this.loadingIndicator.classList.add('active');
            }
            
            hideLoading() 
            {
                this.loadingIndicator.classList.remove('active');
            }
            
            showError(message, type = 'error') 
            {
                this.errorMessage.textContent = message;
                this.errorMessage.style.display = 'block';
                this.errorMessage.style.backgroundColor = type === 'success' ? '#d4edda' : '#f8d7da';
                this.errorMessage.style.borderColor = type === 'success' ? '#c3e6cb' : '#f5c6cb';
                this.errorMessage.style.color = type === 'success' ? '#155724' : '#721c24';
                
                if (type === 'success') 
                {
                    setTimeout(() => this.hideError(), 2000);
                }
            }
            
            hideError() 
            {
                this.errorMessage.style.display = 'none';
            }
            
            formatFileName(path) 
            {
                return path.split(/[\\/]/).pop() || path;
            }
            
            clearResults() 
            {
                this.resultsInfo.style.display = 'none';
                this.pagination.style.display = 'none';
                this.resultsList.innerHTML = '';
                this.hideError();
            }
        }
        
        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => 
        {
            new RemoteFileSearch();
        });
    </script>
